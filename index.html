<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Fee Portal</title>
<link rel="icon" type="image/png" href="images/logo.png">

<style>
body{
font-family:Arial;
margin:0;
background:#f2f5ff;
}

/* HEADER FIXED */
.header{
background:#0b3d91;
text-align:center;
padding:15px 10px;
color:white;
}

/* LOGO FIX */
.logo{
width:90px;
height:auto;
display:block;
margin:0 auto 10px auto;
background:white;
padding:6px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.login-box{
text-align:center;
padding:30px;
}

input, select{
padding:12px;
width:230px;
font-size:16px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:12px 25px;
font-size:16px;
background:#0b3d91;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

.loader{
display:none;
text-align:center;
padding:30px;
}

.spinner{
border:6px solid #eee;
border-top:6px solid #0b3d91;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.section-title{
background:#d4af37;
color:black;
padding:12px;
margin:15px;
border-radius:6px;
font-size:18px;
font-weight:bold;
text-align:center;
}

.profile{
text-align:left;
background:white;
margin:15px;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.info{
font-size:15px;
margin:8px 0;
}

.label{
font-weight:bold;
}

.table-container{
margin:15px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
font-size:14px;
}

th{
background:#0b3d91;
color:white;
}

tr:nth-child(even){
background:#e8f1ff;
}

.fee-cards{
display:none;
padding:15px;
}

.fee-card{
border-radius:12px;
padding:16px;
margin-bottom:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.12);
}

.fee-card:nth-child(odd){
background:#ffffff;
}

.fee-card:nth-child(even){
background:#e8f1ff;
}

@media(max-width:600px){
.table-container{display:none;}
.fee-cards{display:block;}
}

.mobile-only{
display:none;
}

@media(max-width:600px){
.mobile-only{
display:block;
}
}

.instructions{
display:none;
}

@media(max-width:600px){
.instructions{
display:block;
margin-top:15px;
font-size:14px;
background:#fff3cd;
padding:12px;
border-radius:6px;
}
}

.logout{
text-align:center;
margin:20px;
}

.pay-btn{
background:#28a745;
color:white;
border:none;
padding:12px 25px;
border-radius:4px;
cursor:pointer;
font-size:16px;
margin-top:10px;
}

.whatsapp-btn{
background:#25D366 !important;
color:white !important;
font-size:14px !important;
padding:8px 12px !important;
border-radius:6px !important;
border:none;
margin-top:5px;
display:inline-block;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<img src="images/logo.png" class="logo">
<h2>Student Fee Portal</h2>
</div>

<div class="login-box" id="loginBox">
<h3>Student Login</h3>
<input type="text" id="loginCode" placeholder="Enter Login Code">
<br><br>
<button id="loginBtn">Login</button>
</div>

<div class="loader" id="loader">
<div class="spinner"></div>
<br>
Loading Student Data...
</div>

<div id="portal" style="display:none">

<div class="profile" style="text-align:center;background:#0b3d91;color:white;">
<h2 id="welcomeName"></h2>
</div>

<div class="section-title">Student Details</div>

<div class="profile">
<div class="info"><span class="label">Student Name :</span> <span id="studentName"></span></div>
<div class="info"><span class="label">Admission Number :</span> <span id="adm"></span></div>
<div class="info"><span class="label">Class :</span> <span id="class"></span></div>
<div class="info"><span class="label">Father's Name :</span> <span id="father"></span></div>
<div class="info"><span class="label">Mother's Name :</span> <span id="mother"></span></div>
<div class="info"><span class="label">Phone Number :</span> <span id="phone"></span></div>
<div class="info"><span class="label">Address :</span> <span id="address"></span></div>
</div>

<div class="section-title">Paid Fee Details</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>Date</th><th>Slip</th><th>Amount</th><th>Type</th><th>Session</th>
<th>T Months</th><th>TR Months</th><th>EX Months</th><th>Mode</th>
</tr>
</thead>
<tbody id="feeTable"></tbody>
</table>
</div>

<div class="fee-cards" id="feeCards"></div>

<div class="section-title">Fee Summary</div>

<div class="profile">
<div class="info"><span class="label">Total Paid :</span> <span id="totalPaid"></span></div>
<div class="info"><span class="label">Balance :</span> <span id="feeBalance"></span></div>

<button id="payBalanceBtn" class="pay-btn mobile-only">Pay Now</button>
<button id="sendScreenshotBalanceBtn" class="whatsapp-btn mobile-only">Send Screenshot</button>
</div>

<div class="logout">
<button onclick="location.reload()">Logout</button>
</div>

</div>

<script>
const sheetID = "1Sy5uBZkjKpGnLdZp2sFuhFORhO1fRqCswfNYHRl73PM";
const apiKey = "AIzaSyB5VIy4kIySW7bVrjNYMpL5rkqZ7Oe758E";

const masterSheet = encodeURIComponent("Master Data 2026");
const feesSheet = encodeURIComponent("Fees Collection");
const awSheet = encodeURIComponent("AW");

async function login(){
const code=document.getElementById("loginCode").value.trim();
if(!code){alert("Enter Login Code");return;}

document.getElementById("loader").style.display="block";

let resp=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetID}/values/${awSheet}?key=${apiKey}`);
let rows=(await resp.json()).values||[];

let admission="",name="";
for(let i=1;i<rows.length;i++){
if(rows[i][29]==code){
admission=rows[i][1];
name=rows[i][3];
break;
}
}

if(!admission){alert("Invalid Code");location.reload();return;}

document.getElementById("studentName").innerText=name;
document.getElementById("welcomeName").innerText="Welcome "+name;
document.getElementById("adm").innerText=admission;

resp=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetID}/values/${feesSheet}?key=${apiKey}`);
rows=(await resp.json()).values||[];

let table="",total=0;

for(let i=1;i<rows.length;i++){
if(rows[i][2]==admission){
let amt=parseFloat(rows[i][5])||0;
total+=amt;
table+=`<tr><td>${rows[i][1]}</td><td>${rows[i][0]}</td><td>₹${amt}</td><td>${rows[i][6]}</td><td>${rows[i][7]}</td><td>${rows[i][8]}</td><td>${rows[i][9]}</td><td>${rows[i][10]}</td><td>${rows[i][11]}</td></tr>`;
}
}

document.getElementById("feeTable").innerHTML=table;
document.getElementById("totalPaid").innerText="₹"+total;
document.getElementById("feeBalance").innerText="₹0";

document.getElementById("loginBox").style.display="none";
document.getElementById("loader").style.display="none";
document.getElementById("portal").style.display="block";
}

document.getElementById("loginBtn").onclick=login;
</script>

</body>
</html>
