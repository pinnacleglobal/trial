<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Student Fee Portal</title>
<link rel="icon" type="image/png" href="images/logo.png">

<style>
/* (NO CHANGE - your full CSS remains same) */
body{font-family:Arial;margin:0;background:#f2f5ff;}
.header{background:#0b3d91;text-align:center;padding:20px;color:white;}
.logo{width:140px;margin-bottom:10px;}
.login-box{text-align:center;padding:30px;}
input, select{padding:12px;width:230px;font-size:16px;border:1px solid #ccc;border-radius:4px;}
button{padding:12px 25px;font-size:16px;background:#0b3d91;color:white;border:none;border-radius:4px;cursor:pointer;}
.loader{display:none;text-align:center;padding:30px;}
.spinner{border:6px solid #eee;border-top:6px solid #0b3d91;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:auto;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.section-title{background:#d4af37;color:black;padding:12px;margin:15px;border-radius:6px;font-size:18px;font-weight:bold;text-align:center;}
.profile{text-align:left;background:white;margin:15px;padding:20px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.info{font-size:15px;margin:8px 0;}
.label{font-weight:bold;}
.table-container{margin:15px;}
table{width:100%;border-collapse:collapse;background:white;}
th,td{border:1px solid #ddd;padding:10px;text-align:center;font-size:14px;}
th{background:#0b3d91;color:white;}
tr:nth-child(even){background:#e8f1ff;}
.fee-cards{display:none;padding:15px;}
.fee-card{border-radius:12px;padding:16px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.12);}
.fee-card:nth-child(odd){background:#ffffff;}
.fee-card:nth-child(even){background:#e8f1ff;}
@media(max-width:600px){.table-container{display:none;}.fee-cards{display:block;}}
.mobile-only{display:none;}
@media(max-width:600px){.mobile-only{display:block;}}
.instructions{display:none;}
@media(max-width:600px){.instructions{display:block;margin-top:15px;font-size:14px;background:#fff3cd;padding:12px;border-radius:6px;}}
.logout{text-align:center;margin:20px;}
.pay-btn{background:#28a745;color:white;border:none;padding:12px 25px;border-radius:4px;cursor:pointer;font-size:16px;margin-top:10px;}
.whatsapp-btn{background:#25D366 !important;color:white !important;font-size:14px !important;padding:8px 12px !important;border-radius:6px !important;border:none;margin-top:5px;display:inline-block;text-align:center;cursor:pointer;width:fit-content;}
</style>
</head>

<body>

<div class="header">
<img src="images/logo.png" class="logo">
<h2>Student Fee Portal</h2>
</div>

<div class="login-box" id="loginBox">
<h3>Student Login</h3>
<input type="text" id="loginCode" placeholder="Enter Login Code">
<br><br>
<button id="loginBtn">Login</button>
</div>

<div class="loader" id="loader">
<div class="spinner"></div>
<br>
Loading Student Data...
</div>

<!-- ✅ KEEP YOUR FULL PORTAL HTML EXACTLY SAME -->
<div id="portal" style="display:none">
<!-- (Your full existing portal content here - unchanged) -->
</div>

<!-- ✅ FIX: SCRIPT INSIDE BODY -->
<script>

const sheetID = "1Sy5uBZkjKpGnLdZp2sFuhFORhO1fRqCswfNYHRl73PM";
const apiKey = "AIzaSyB5VIy4kIySW7bVrjNYMpL5rkqZ7Oe758E";

const masterSheet = encodeURIComponent("Master Data 2026");
const feesSheet = encodeURIComponent("Fees Collection");
const awSheet = encodeURIComponent("AW");

async function login() {
    const code = document.getElementById("loginCode").value.trim();
    if (!code) { alert("Enter Login Code"); return; }

    document.getElementById("loginBtn").disabled = true;
    document.getElementById("loader").style.display = "block";

    try {
        let resp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetID}/values/${awSheet}?key=${apiKey}`);
        let rows = (await resp.json()).values || [];
        let admission = "", studentName = "", father = "", mother = "", phone = "", address = "";
        let loginBlocked = false;

        for (let i = 1; i < rows.length; i++) {
            let r = rows[i];
            if (r[29] && r[29].trim() == code) {
                if (r[31] && r[31].toUpperCase() == "TRUE") { loginBlocked = true; break; }
                admission = r[1] || ""; studentName = r[3] || ""; father = r[6] || "";
                mother = r[5] || ""; phone = r[22] || ""; address = r[7] || ""; break;
            }
        }

        if (loginBlocked) { alert("You Cannot Login As You Have Left The School."); location.reload(); return; }
        if (!admission) { alert("Invalid Login Code"); location.reload(); return; }

        resp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetID}/values/${masterSheet}?key=${apiKey}`);
        rows = (await resp.json()).values || [];

        let studentClass = "", monthlyTuition = 0, tuitionMonths = 0, transportFees = 0, transportMonths = 0, prevRemain = 0, discount = 0, examFee = 1000;

        for (let i = 1; i < rows.length; i++) {
            let r = rows[i]; 
            if (r[1] == admission) {
                studentClass = r[14] || "";
                monthlyTuition = parseFloat(r[4]) || 0;
                prevRemain = parseFloat(r[3]) || 0;
                discount = parseFloat(r[5]) || 0;
                tuitionMonths = parseFloat(r[6]) || 0;
                transportFees = parseFloat(r[7]) || 0;
                transportMonths = parseFloat(r[8]) || 0;
                examFee = parseFloat(r[9]) || 1000;
                break;
            }
        }

        document.getElementById("studentName").innerText = studentName;
        document.getElementById("welcomeName").innerText = "Welcome, " + studentName;
        document.getElementById("class").innerText = studentClass;
        document.getElementById("adm").innerText = admission;

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("loader").style.display = "none";
        document.getElementById("portal").style.display = "block";

    } catch (e) {
        console.error(e);
        alert("Error loading data");
    }
}

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("loginBtn").addEventListener("click", login);
    document.getElementById("loginCode").addEventListener("keypress", function (e) {
        if (e.key === "Enter") login();
    });
});

</script>

</body>
</html>
